name: buddhist_study
description: Offline Buddhist study interface — suttas, semantic search, study plans, notes.
publish_to: none
version: 0.1.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.19.0"

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^14.2.7

  # ObjectBox — entities + vector search
  objectbox: ^4.0.1
  objectbox_flutter_libs: ^4.0.1

  # TFLite — on-device query embedding
  tflite_flutter: ^0.10.4

  # Local storage (settings, onboarding state)
  shared_preferences: ^2.3.2

  # UI
  google_fonts: ^6.2.1
  flutter_markdown: ^0.7.3
  lucide_icons: ^0.0.7

  # Utils
  path_provider: ^2.1.4
  path: ^1.9.0
  collection: ^1.18.0
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.12
  riverpod_generator: ^2.4.3
  objectbox_generator: ^4.0.1
  custom_lint: ^0.6.7
  riverpod_lint: ^2.3.13

flutter:
  uses-material-design: true

  assets:
    - assets/data/
    - assets/model/
    - assets/fonts/

  fonts:
    - family: Lora
      fonts:
        - asset: assets/fonts/Lora-Regular.ttf
        - asset: assets/fonts/Lora-Italic.ttf
          style: italic
        - asset: assets/fonts/Lora-Bold.ttf
          weight: 700
